# EKF: fuse wheel odom (noisy, frame-fixed) + KISS LiDAR odom + IMU.
# TB3 uses base_footprint; both odom inputs must use parent frame "odom" + child "base_footprint".

ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.2
    print_diagnostics: true
    debug: false
    publish_tf: false
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # Wheel slip / noisy odometry (must match odom_child_frame_fix output)
    odom0: /odom_noisy_carto
    odom0_config: [true, true, false,
                   false, false, true,
                   true, false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false
    odom0_nodelay: true

    # KISS-ICP (pose correction; tune covariances on odom topic if needed)
    odom1: /kiss/odometry
    odom1_config: [true, true, false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_queue_size: 10
    odom1_differential: false
    odom1_relative: false
    odom1_nodelay: true

    imu0: /imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true, true, false]
    imu0_queue_size: 20
    imu0_differential: false
    imu0_relative: false
    imu0_nodelay: true
    imu0_remove_gravitational_acceleration: true

    use_control: false
