# Tuned EKF settings for offline bag fusion:
# - KISS-ICP is only 5 Hz (scan), so sensor_timeout must be > 0.2 s to avoid dropouts.
# - For 2D localization without magnetometer, using IMU absolute yaw often hurts.
#   Use only yaw rate (wz) as a constraint; let odometry/ICP provide yaw.

ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.5
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.2
    print_diagnostics: true
    debug: false
    publish_tf: false
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # Wheel slip / noisy odometry (must match odom_child_frame_fix output)
    odom0: /odom_noisy_carto
    odom0_config: [true, true, false,
                   false, false, true,
                   true, false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false
    odom0_nodelay: true

    # KISS-ICP (pose correction)
    odom1: /kiss/odometry
    odom1_config: [true, true, false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_queue_size: 10
    odom1_differential: false
    odom1_relative: false
    odom1_nodelay: true

    imu0: /imu
    # Use only yaw rate (wz). Do NOT fuse absolute yaw.
    # Layout: [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_queue_size: 50
    imu0_differential: false
    imu0_relative: false
    imu0_nodelay: true
    imu0_remove_gravitational_acceleration: true

    use_control: false

